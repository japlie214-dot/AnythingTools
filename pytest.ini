# pytest.ini
[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
python_classes = Test*

# Ensure we don't capture stdout for logs_query tests that check output
addopts = -v --tb=short

# Register custom markers so --strict-markers (if enabled) doesn't fail.
# Ref: https://docs.pytest.org/en/stable/how-to/mark.html#registering-marks
markers =
    db_off: marks tests that bypass the DB (autouse _disable_db_integration fixture also applies)
    network: marks tests that require live network access (deselect with `-m "not network"`)
